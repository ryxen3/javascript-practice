<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- header section -->
    <div class="container-fluid bg-black text-light display-5 d-flex justify-content-center fw-semibold py-3">
        Invoice
    </div>

    <!-- hero section -->
    <div class="container-fluid bg-secondary-subtle py-sm-5">

        <!-- form -->
        <form class="mx-auto mb-5" style="max-width: 800px;">
            <div class="row bg-white p-2" style="border: 1px solid #000;">
                <div class="col-12 text-center fs-3 mb-3">
                    Customer Information
                </div>
                <div class="row mb-3">
                    <label for="invoiceNo" class="col-sm-3" style="padding: 4px 12px;">
                        Invoice No:
                    </label>
                    <input type="number" id="invoiceNo" class="col-sm-9" style="padding: 4px 12px;">
                </div>
                <div class="row mb-3">
                    <label for="customerName" class="col-sm-3">
                        Customer Name:
                    </label>
                    <input type="text" id="customerName" class="col-sm-9" style="padding: 4px 12px;">
                </div>
                <div class="row mb-3">
                    <label for="phoneNo" class="col-sm-3">
                        Phone No:
                    </label>
                    <input type="tel" id="phoneNo" class="col-sm-9" style="padding: 4px 12px;">
                </div>
                <div class="row mb-3">
                    <label for="addressName" class="col-sm-3">
                        Address:
                    </label>
                    <div class="col-sm-9 p-0">
                        <textarea id="addressName" rows="2" class="w-100" style="padding: 4px 12px;"></textarea>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-6 mb-5">
                        <span class="fw-semibold d-block pb-2">
                            Select payment Method:
                        </span>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="paymentCheck" id="paymentVisa"
                                value="VISA">
                            <label class="form-check-label" for="paymentVisa">
                                VISA
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="paymentCheck" id="paymentMasterCard"
                                value="MasterCard">
                            <label class="form-check-label" for="paymentMasterCard">
                                Master Card
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="paymentCheck" id="paymentCash"
                                value="Cash">
                            <label class="form-check-label" for="paymentCash">
                                Cash
                            </label>
                        </div>
                    </div>
                    <div class="col-sm-6">
                        <span class="fw-semibold d-block pb-2">
                            Location (Country):
                        </span>
                        <select id="selectLocation">
                            <option disabled selected class="d-none"></option>
                            <option value="Bangladesh">Bangladesh</option>
                            <option value="Australia">Australia</option>
                            <option value="France">France</option>
                            <option value="Argentina">Argentina</option>
                            <option value="Spain">Spain</option>
                            <option value="England">England</option>
                        </select>
                    </div>
                </div>
            </div>
        </form>
        <!-- submit section -->
        <div class="mx-auto bg-light" style="max-width: 400px; border: 1px solid #000">
            <div class="fs-3 d-flex justify-content-center fw-semibold py-3">
                Are You Ready?
            </div>
            <div class="d-flex justify-content-center pb-3">
                <input class="btn btn-primary" type="submit" value="Submit" id="submitBtn">
            </div>
        </div>
    </div>

    <!-- customer information display section -->
    <div id="customerDisplayContainer" class="container py-5" style="display: none;">
        <div id="customerInformation" class="col-12 col-sm-6"
            style="border: 2px solid #000; padding: 20px; background-color: white;">
        </div>
    </div>

    <!-- Bootstrap JavaScript Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <!-- JavaScript link -->
    <script src="script.js"></script>
</body>

</html>
