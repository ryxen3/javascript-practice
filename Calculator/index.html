<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container calculator-box mt-5">
        <!-- Display Screen -->
        <div class="row">
            <div class="col-12">
                <div class="calculator-display display-1" id="calculator-display"></div>
            </div>
        </div>

        <!-- row 1-->
        <div class="row g-2 mt-2">
            <div class="col-3">
                <button class="btn btn-dark-lavender calculator-btn" id="btn-ac">AC</button>
            </div>
            <div class="col-3">
                <button class="btn btn-navy-blue calculator-btn" id="btn-bracket">( )</button>
            </div>
            <div class="col-3">
                <button class="btn btn-navy-blue calculator-btn" id="btn-percent">%</button>
            </div>
            <div class="col-3">
                <button class="btn btn-navy-blue calculator-btn" id="btn-divide">÷</button>
            </div>
        </div>

        <!-- row 2-->
        <div class="row g-2 mt-2">
            <div class="col-3">
                <button class="btn btn-dark calculator-btn" id="btn-7">7</button>
            </div>
            <div class="col-3">
                <button class="btn btn-dark calculator-btn" id="btn-8">8</button>
            </div>
            <div class="col-3">
                <button class="btn btn-dark calculator-btn" id="btn-9">9</button>
            </div>
            <div class="col-3">
                <button class="btn btn-navy-blue calculator-btn" id="btn-multiply">x</button>
            </div>
        </div>

        <!-- row 3− -->
        <div class="row g-2 mt-2">
            <div class="col-3">
                <button class="btn btn-dark calculator-btn" id="btn-4">4</button>
            </div>
            <div class="col-3">
                <button class="btn btn-dark calculator-btn" id="btn-5">5</button>
            </div>
            <div class="col-3">
                <button class="btn btn-dark calculator-btn" id="btn-6">6</button>
            </div>
            <div class="col-3">
                <button class="btn btn-navy-blue calculator-btn" id="btn-minus">-</button>
            </div>
        </div>

        <!-- row 4-->
        <div class="row g-2 mt-2">
            <div class="col-3">
                <button class="btn btn-dark calculator-btn" id="btn-1">1</button>
            </div>
            <div class="col-3">
                <button class="btn btn-dark calculator-btn" id="btn-2">2</button>
            </div>
            <div class="col-3">
                <button class="btn btn-dark calculator-btn" id="btn-3">3</button>
            </div>
            <div class="col-3">
                <button class="btn btn-navy-blue calculator-btn" id="btn-plus">+</button>
            </div>
        </div>

        <!-- row 5-->
        <div class="row g-2 mt-2">
            <div class="col-3">
                <button class="btn btn-dark calculator-btn" id="btn-0">0</button>
            </div>
            <div class="col-3">
                <button class="btn btn-dark calculator-btn" id="btn-backspace">
                    <i class="bi bi-backspace"></i>
                </button>
            </div>
            <div class="col-3">
                <button class="btn btn-dark calculator-btn" id="btn-dot">.</button>
            </div>
            <div class="col-3">
                <button class="btn btn btn-light-lavender calculator-btn" id="btn-equal">=</button>
            </div>
        </div>
    </div>

    <!-- Bootstrap JavaScript Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <!-- JavaScript link -->
    <script src="script.js"></script>
</body>

</html>
